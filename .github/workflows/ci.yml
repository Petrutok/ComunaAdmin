name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm install instead of npm ci: the lockfile is written on macOS and
      # platform-specific optional deps (wasm bindings) differ on Linux,
      # which makes npm ci's strict sync check fail spuriously
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test
